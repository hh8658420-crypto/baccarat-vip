<!DOCTYPE html><html lang="zh-CN"><head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover"><meta name="theme-color" content="#14080b">
<title>DB真人百家乐模拟器 Final</title><link rel="manifest" href="manifest.json"><link rel="stylesheet" href="style.css"></head><body>
<div id="app">
  <header class="phoneTop"><div class="left">‹</div><div class="title">DB真人</div><div class="right"><span id="soundBtn">🔊</span> ⛶</div></header>
  <section class="liveRoom">
    <div class="casinoBg"><div class="dealer"><div class="head"></div><div class="hair"></div><div class="body"></div><div class="arm leftArm"></div><div class="arm rightArm"></div></div><div class="tableLip"></div></div>
    <div class="liveHud"><span class="redDot"></span><b>0.65</b><span>极速模拟桌</span><i>靴 <b id="shoeNo">1</b></i><i>局 <b id="roundNo">0</b></i></div>
    <div class="screenBox"><b id="statusText">等待下注</b><small>8副牌 · 标准补牌规则</small></div>
    <div class="dealZone"><div class="miniHand"><b>闲</b><div id="pMini" class="miniCards"></div></div><div class="miniHand bankerMini"><b>庄</b><div id="bMini" class="miniCards"></div></div></div>
  </section>
  <main class="betDesk">
    <div class="timerWrap"><div id="timerRing" class="timerRing"><span id="countdown">15</span></div><div id="message" class="message">请选择筹码下注</div></div>
    <section class="mainPlay"><button class="bet main p" data-bet="player"><small>1:1</small><b>闲</b><em id="amount_player">0</em></button><button class="bet main t" data-bet="tie"><small>1:8</small><b>和</b><em id="amount_tie">0</em></button><button class="bet main b" data-bet="banker"><small>1:0.95</small><b>庄</b><em id="amount_banker">0</em></button></section>
    <section class="sidePlay"><button class="bet side" data-bet="playerPair"><b>闲对</b><small>1:11</small><em id="amount_playerPair">0</em></button><button class="bet side" data-bet="bankerPair"><b>庄对</b><small>1:11</small><em id="amount_bankerPair">0</em></button><button class="bet side" data-bet="anyPair"><b>任意对子</b><small>1:5</small><em id="amount_anyPair">0</em></button><button class="bet side" data-bet="perfectPair"><b>完美对子</b><small>1:25</small><em id="amount_perfectPair">0</em></button><button class="bet side" data-bet="big"><b>大</b><small>1:0.54</small><em id="amount_big">0</em></button><button class="bet side" data-bet="small"><b>小</b><small>1:1.5</small><em id="amount_small">0</em></button></section>
    <div class="chipBar" id="chips"><button class="chip" data-chip="100">100</button><button class="chip" data-chip="500">500</button><button class="chip active" data-chip="1000">1K</button><button class="chip" data-chip="5000">5K</button><button class="chip" data-chip="10000">1W</button><button class="chip" data-chip="50000">5W</button></div>
    <div class="actionBar"><button id="repeatBtn">重复</button><button id="cancelBtn">撤销</button><button id="dealBtn" class="dealBtn">立即开牌</button><button id="resetBtn">重置</button></div>
    <div class="moneyBar"><span>余额 <b id="money">100000</b></span><span>下注 <b id="totalBet">0</b></span><span>剩牌 <b id="shoeLeft">416</b></span></div>
  </main>
  <section class="roads"><div class="roadTop"><b>珠盘路</b><span>庄 <i id="bWins">0</i></span><span>闲 <i id="pWins">0</i></span><span>和 <i id="tWins">0</i></span><span>胜率 <i id="winRate">0%</i></span></div><div id="beadRoad" class="beadRoad"></div><div class="roadTitle">大路</div><div id="bigRoad" class="bigRoad"></div></section>
  <div class="disclaimer">仅用于百家乐开奖概率、补牌规则与路单数据模拟；无充值、无提现、无真实博彩。</div>
</div><script src="game.js"></script></body></html>
