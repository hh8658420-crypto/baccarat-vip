<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="apple-mobile-web-app-title" content="VIP百家乐" />
<meta name="theme-color" content="#050b08" />
<link rel="manifest" href="manifest.json" />
<link rel="stylesheet" href="style.css" />
<title>澳门 VIP บาคาร่า</title>
</head>

<body>
<div class="app">
  <header class="topbar">
    <div class="brand">
      <div class="logo">♛</div>
      <div>
        <div class="title">MACAU VIP BACCARAT</div>
        <div class="sub">娱乐概率模拟器 · 无真实博彩</div>
      </div>
    </div>

    <div class="wallet">
      <span>资金</span>
      <strong id="money">10000</strong>
    </div>

    <button class="soundBtn" id="soundBtn">🔊</button>
  </header>

  <main class="casino">
    <section class="dealerStage">
      <div class="light left"></div>
      <div class="light right"></div>
      <div class="dealer">
        <div class="dealerFace">👩🏻‍💼</div>
        <div class="dealerName">VIP 荷官</div>
      </div>
    </section>

    <section class="table">
      <div class="tableLogo">MACAU VIP</div>

      <div class="hands">
        <div class="handPanel playerPanel">
          <div class="handTitle">闲 PLAYER</div>
          <div id="playerCards" class="cards"></div>
          <div class="score">点数 <span id="playerScore">-</span></div>
        </div>

        <div class="handPanel bankerPanel">
          <div class="handTitle">庄 BANKER</div>
          <div id="bankerCards" class="cards"></div>
          <div class="score">点数 <span id="bankerScore">-</span></div>
        </div>
      </div>

      <div class="betZones">
        <button class="betZone blue" data-bet="player">闲<br><span>1赔1</span></button>
        <button class="betZone gold" data-bet="tie">和<br><span>1赔8</span></button>
        <button class="betZone red" data-bet="banker">庄<br><span>抽水5%</span></button>
      </div>

      <div class="chips">
        <button class="chip" data-chip="100">100</button>
        <button class="chip" data-chip="500">500</button>
        <button class="chip active" data-chip="1000">1K</button>
        <button class="chip" data-chip="5000">5K</button>
        <button class="chip" data-chip="10000">1W</button>
      </div>

      <div class="controls">
        <button id="dealBtn" class="dealBtn">开始发牌</button>
        <button id="repeatBtn" class="darkBtn">重复下注</button>
        <button id="resetBtn" class="darkBtn">重置</button>
      </div>

      <div id="message" class="message">请选择筹码和下注区域</div>
    </section>

    <aside class="sidePanel">
      <div class="statGrid">
        <div><span>局数</span><strong id="rounds">0</strong></div>
        <div><span>闲胜</span><strong id="pWins">0</strong></div>
        <div><span>庄胜</span><strong id="bWins">0</strong></div>
        <div><span>和局</span><strong id="tWins">0</strong></div>
        <div><span>胜率</span><strong id="winRate">0%</strong></div>
        <div><span>连胜</span><strong id="streak">0</strong></div>
      </div>

      <div class="roadBox">
        <div class="roadTitle">珠盘路</div>
        <div id="beadRoad" class="beadRoad"></div>
      </div>

      <div class="roadBox">
        <div class="roadTitle">大路</div>
        <div id="bigRoad" class="bigRoad"></div>
      </div>
    </aside>
  </main>
</div>

<script src="game.js"></script>
</body>
</html>
