<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VIP 百家乐</title>
</head>
<body style="background:#0b3d2e;color:white;text-align:center;font-family:Arial">

<h1>VIP 百家乐</h1>

<div>💰 资金：<span id="money">10000</span></div>

<hr>

<div>
<button onclick="bet('player')">闲</button>
<button onclick="bet('banker')">庄</button>
<button onclick="bet('tie')">和</button>
</div>

<br>

<button onclick="deal()">开始发牌</button>

<p id="result"></p>

<script>
let money = 10000;
let currentBet = null;
let betAmount = 1000;

function bet(type){
    currentBet = type;
    alert("已下注：" + type);
}

function card(){
    return Math.floor(Math.random()*10);
}

function deal(){

    if(!currentBet){
        alert("请先下注");
        return;
    }

    let player = (card()+card())%10;
    let banker = (card()+card())%10;

    let result = "";

    if(player > banker) result = "player";
    else if(banker > player) result = "banker";
    else result = "tie";

    if(result === currentBet){
        money += betAmount;
    }else{
        money -= betAmount;
    }

    document.getElementById("money").innerText = money;
    document.getElementById("result").innerText = "结果：" + result;

    currentBet = null;
}
</script>

</body>
</html>
