<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
  <meta name="theme-color" content="#080302" />
  <title>Macau VIP Baccarat Simulator V10</title>
  <link rel="manifest" href="manifest.json" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
<div id="app">
  <header class="topbar">
    <div class="brand">
      <span class="gold-dot"></span>
      <div>
        <strong>MACAU VIP BACCARAT</strong>
        <small>概率模拟器 · 无充值 · 无提现</small>
      </div>
    </div>
    <div class="shoe-info">
      <span>靴号 <b id="shoeNo">01</b></span>
      <span>局号 <b id="roundNo">000</b></span>
      <span>余牌 <b id="cardsLeft">416</b></span>
    </div>
  </header>

  <main class="casino">
    <section class="dealer-wall">
      <div class="dealer-video" aria-label="模拟荷官">
        <div class="dealer-head"></div>
        <div class="dealer-body"></div>
        <span>LIVE DEALER SIM</span>
      </div>
      <div class="countdown" id="countdown">15</div>
    </section>

    <section class="table-wrap">
      <div class="table-felt">
        <div class="table-title">VIP ROOM · BACCARAT</div>

        <div class="hand-zone player-hand">
          <div class="hand-label">闲家 <b id="playerScore">0</b></div>
          <div class="cards" id="playerCards"></div>
        </div>
        <div class="hand-zone banker-hand">
          <div class="hand-label">庄家 <b id="bankerScore">0</b></div>
          <div class="cards" id="bankerCards"></div>
        </div>

        <div class="bet-layout">
          <button class="bet-box side" data-bet="playerPair"><span>闲对</span><em>1赔11</em><b id="bet_playerPair">0</b></button>
          <button class="bet-box side" data-bet="anyPair"><span>任意对子</span><em>1赔5</em><b id="bet_anyPair">0</b></button>
          <button class="bet-box side" data-bet="perfectPair"><span>完美对子</span><em>1赔25</em><b id="bet_perfectPair">0</b></button>
          <button class="bet-box side" data-bet="bankerPair"><span>庄对</span><em>1赔11</em><b id="bet_bankerPair">0</b></button>

          <button class="bet-box main player" data-bet="player"><span>闲</span><em>1赔1</em><b id="bet_player">0</b></button>
          <button class="bet-box main tie" data-bet="tie"><span>和</span><em>1赔8</em><b id="bet_tie">0</b></button>
          <button class="bet-box main banker" data-bet="banker"><span>庄</span><em>1赔0.95</em><b id="bet_banker">0</b></button>

          <button class="bet-box side slim" data-bet="big"><span>大</span><em>5/6张</em><b id="bet_big">0</b></button>
          <button class="bet-box side slim" data-bet="small"><span>小</span><em>4张</em><b id="bet_small">0</b></button>
        </div>

        <div class="result-board" id="message">请选择筹码下注</div>
      </div>
    </section>
  </main>

  <aside class="road-panel">
    <div class="road-head">
      <div><strong>路单</strong><small>庄/闲/和 统计走势</small></div>
      <div class="stats">
        <span>庄 <b id="bankerWins">0</b></span>
        <span>闲 <b id="playerWins">0</b></span>
        <span>和 <b id="tieWins">0</b></span>
      </div>
    </div>
    <div class="roads">
      <div class="road"><h3>珠盘路</h3><div class="road-grid bead" id="beadRoad"></div></div>
      <div class="road"><h3>大路</h3><div class="road-grid big-road" id="bigRoad"></div></div>
      <div class="road compact"><h3>大眼仔</h3><div class="road-grid tiny" id="eyeRoad"></div></div>
      <div class="road compact"><h3>小路</h3><div class="road-grid tiny" id="smallRoad"></div></div>
    </div>
  </aside>

  <footer class="control-panel">
    <div class="balance-card">
      <span>模拟余额</span><b id="balance">100000</b>
      <i>本页面只做概率模拟</i>
    </div>

    <div class="chip-rack" id="chipRack"></div>

    <div class="action-row">
      <button class="action secondary" id="repeatBtn">重复</button>
      <button class="action secondary" id="undoBtn">撤销</button>
      <button class="action primary" id="dealBtn">立即开牌</button>
      <button class="action secondary" id="clearBtn">清空</button>
      <button class="action secondary" id="soundBtn">🔊</button>
    </div>
  </footer>
</div>

<div class="chip-fly" id="chipFly"></div>
<script src="game.js"></script>
</body>
</html>
