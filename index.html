<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VIP 百家乐</title>
</head>

<body style="background:#0b3d2e;color:white;text-align:center;font-family:Arial">

<h1>VIP 百家乐</h1>

<div>💰 资金：<span id="money">10000</span></div>

<hr>

<div>
<button onclick="placeBet('player')">闲</button>
<button onclick="placeBet('banker')">庄</button>
<button onclick="placeBet('tie')">和</button>
</div>

<br>

<button onclick="deal()">开始发牌</button>

<p id="result"></p>

<script>
let money = 10000;
let bet = null;
let betAmount = 1000;

let shoe = [];

function initShoe(){
    shoe = [];
    for(let d=0; d<8; d++){
        for(let i=0;i<52;i++){
            let v = (i%13)+1;
            if(v>9) v=0;
            shoe.push(v);
        }
    }
    for(let i=shoe.length-1;i>0;i--){
        let j=Math.floor(Math.random()*(i+1));
        [shoe[i],shoe[j]]=[shoe[j],shoe[i]];
    }
}

function draw(){
    return shoe.pop();
}

function score(arr){
    return arr.reduce((a,b)=>a+b,0)%10;
}

function placeBet(t){
    bet=t;
    document.getElementById("result").innerText="已下注："+t;
}

function deal(){

    if(!bet){
        alert("请先下注");
        return;
    }

    let p=[draw(),draw()];
    let b=[draw(),draw()];

    let ps=score(p);
    let bs=score(b);

    if(ps<=5) p.push(draw());
    if(bs<=5) b.push(draw());

    let fp=score(p);
    let fb=score(b);

    let r="tie";
    if(fp>fb) r="player";
    else if(fb>fp) r="banker";

    if(r===bet) money+=betAmount;
    else money-=betAmount;

    localStorage.setItem("money",money);

    document.getElementById("money").innerText=money;
    document.getElementById("result").innerText=
        "结果："+r+" 闲:"+fp+" 庄:"+fb;

    bet=null;
}

initShoe();
</script>

</body>
</html>
